<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BISL Display</title>

  <!-- Google Fonts: Lato + Playfair Display (body / quote) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ── Particle Canvas ───────────────────────────────────────────────── -->
  <canvas id="particle-canvas"></canvas>

  <!-- ── Main Layout ───────────────────────────────────────────────────── -->
  <div id="app">

    <!-- ── Header bar ──────────────────────────────────────────────────── -->
    <header id="header">
      <div id="header-left">
        <div id="school-name-header">THE BRITISH INTERNATIONAL SCHOOL OF LUBUMBASHI</div>
        <div id="school-motto">Aiming for Excellence</div>
      </div>
      <div id="header-center"></div>
      <div id="header-right">
        <div id="clock-display">
          <span id="time-str">00:00</span><span id="sec-str">:00</span>
        </div>
        <div id="date-str">Loading…</div>
      </div>
      <!-- Small settings gear icon — top-right corner -->
      <button id="settings-btn" title="Admin Settings" aria-label="Open admin panel">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.63-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.484.484 0 0 0-.48.41l-.36 2.54a7.01 7.01 0 0 0-1.63.94l-2.39-.96a.488.488 0 0 0-.59.22L2.63 8.47a.49.49 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.05.67 1.63.94l.36 2.54c.05.24.27.41.49.41h4c.24 0 .44-.17.47-.41l.36-2.54a7.01 7.01 0 0 0 1.63-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </header>

    <!-- ── Slide content area ──────────────────────────────────────────── -->
    <main id="main-content">
      <div id="slide-viewport">
        <!-- Slides injected here by JS -->
      </div>
    </main>

    <!-- ── Footer (above ticker) ─────────────────────────────────────── -->
    <footer id="footer">
      <div id="nav-dots"></div>
      <div id="footer-website">www.britishinternationalschool.org</div>
    </footer>

  </div>

  <!-- ── Scrolling news ticker ───────────────────────────────────────── -->
  <div id="news-ticker"></div>

  <!-- ── Background music ────────────────────────────────────────────── -->
  <audio id="bg-music" preload="none"></audio>

  <script src="js/display.js"></script>
</body>
</html>
