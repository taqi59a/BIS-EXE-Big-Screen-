name: bisl_display
description: British International School of Lubumbashi - Digital Signage Display App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # State Management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Date / Localisation
  intl: ^0.19.0

  # Audio (with fade support)
  just_audio: ^0.9.40

  # Animation helpers
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.2.1

  # Permissions (USB / storage)
  permission_handler: ^11.3.1

  # Keep screen on
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Force older Android plugin versions to avoid Kotlin 2.2.0 incompatibility
# (package_info_plus 9.x and wakelock_plus 1.4.x require Kotlin 2.2.0 but
#  our build toolchain uses Kotlin 2.1.x)
dependency_overrides:
  package_info_plus: '8.1.4'
  wakelock_plus: '1.2.8'

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/music/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
